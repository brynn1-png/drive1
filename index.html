<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyDrive — Personal Cloud Storage</title>
  <meta name="description" content="Your personal cloud drive. Upload, organize, and access your files from anywhere — powered by Supabase." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ============================================================
       Toast Notifications Container
       ============================================================ -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ============================================================
       Upload Progress Overlay
       ============================================================ -->
  <div id="upload-overlay" class="upload-overlay hidden" role="dialog" aria-modal="true" aria-label="Uploading file">
    <div class="upload-progress-card">
      <div class="upload-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </div>
      <div class="upload-filename" id="upload-filename">Uploading...</div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
      <div class="upload-percent" id="upload-percent">0%</div>
    </div>
  </div>

  <!-- ============================================================
       Lightbox — Full-screen image preview
       ============================================================ -->
  <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true" aria-label="Image preview">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close preview">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>
    <img id="lightbox-img" src="" alt="Preview" />
  </div>

  <!-- ============================================================
       Create Folder Modal
       ============================================================ -->
  <div id="folder-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="folder-modal-title">
    <div class="modal-card">
      <h3 id="folder-modal-title">Create New Folder</h3>
      <input
        type="text"
        id="folder-name-input"
        placeholder="e.g. Work, Vacation, Archive…"
        maxlength="60"
        aria-label="Folder name"
        autocomplete="off"
      />
      <div class="modal-actions">
        <button class="btn btn-ghost" id="folder-modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="folder-modal-confirm">Create Folder</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       Move File Modal
       ============================================================ -->
  <div id="move-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="move-modal-title">
    <div class="modal-card">
      <h3 id="move-modal-title">Move to Folder</h3>
      <div id="move-folder-list" role="list"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="move-modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       Project Modal (Create / Rename)
       ============================================================ -->
  <div id="project-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="project-modal-title">
    <div class="modal-card">
      <h3 id="project-modal-title">Create New Project</h3>
      <input
        type="text"
        id="project-name-input"
        placeholder="e.g. Work, Personal, Side Project…"
        maxlength="60"
        aria-label="Project name"
        autocomplete="off"
      />
      <div class="modal-actions">
        <button class="btn btn-ghost" id="project-modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="project-modal-confirm">Create Project</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       File Action Bottom Sheet (mobile)
       ============================================================ -->
  <div id="action-sheet" class="action-sheet hidden" role="dialog" aria-modal="true" aria-label="File actions">
    <div class="action-sheet-backdrop" id="action-sheet-backdrop"></div>
    <div class="action-sheet-panel">
      <div class="action-sheet-handle"></div>
      <div class="action-sheet-filename" id="action-sheet-filename"></div>
      <div class="action-sheet-actions" id="action-sheet-actions">
        <button class="action-sheet-btn" data-action="download">
          <span class="action-sheet-btn-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          </span>
          <span>Download</span>
        </button>
        <button class="action-sheet-btn action-sheet-btn-preview" data-action="preview">
          <span class="action-sheet-btn-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </span>
          <span>Preview</span>
        </button>
        <button class="action-sheet-btn" data-action="move">
          <span class="action-sheet-btn-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg>
          </span>
          <span>Move</span>
        </button>
        <button class="action-sheet-btn action-sheet-btn-danger" data-action="delete">
          <span class="action-sheet-btn-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg>
          </span>
          <span>Delete</span>
        </button>
      </div>
      <button class="action-sheet-cancel" id="action-sheet-cancel">Cancel</button>
    </div>
  </div>

  <!-- ============================================================
       App Layout
       ============================================================ -->
  <div class="app-container">

    <!-- ==================== Sidebar ==================== -->
    <aside class="sidebar" id="sidebar" aria-label="Navigation">

      <!-- Logo -->
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon" aria-hidden="true">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#logo-grad)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <defs><linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#a0a0a0"/><stop offset="100%" stop-color="#808080"/></linearGradient></defs>
              <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z"/>
            </svg>
          </span>
          <span class="logo-text">MyDrive</span>
        </div>
      </div>

      <!-- Upload button (label wraps hidden input) -->
      <label class="upload-btn" for="file-input" id="upload-label" role="button" tabindex="0">
        <svg class="upload-btn-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        <span>Upload Files</span>
      </label>
      <input type="file" id="file-input" multiple hidden aria-label="Select files to upload" />

      <!-- App navigation -->
      <div class="sidebar-section sidebar-nav-section">
        <nav id="app-nav" aria-label="App sections">
          <button class="nav-item active" data-view="files">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
            <span>All Files</span>
          </button>
          <button class="nav-item" data-view="notes">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span>Notes</span>
            <span class="nav-badge" id="notes-count"></span>
          </button>
          <button class="nav-item" data-view="tasks">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            <span>Tasks</span>
            <span class="nav-badge" id="tasks-count"></span>
          </button>
        </nav>
      </div>

      <!-- Context panel: changes per view -->
      <div class="sidebar-section sidebar-context" id="sidebar-context">
        <!-- Files context: upload + new folder -->
        <div class="sidebar-context-panel" id="ctx-files">
          <div class="sidebar-section-title">Folders</div>
          <nav id="folder-list" aria-label="Folder navigation"></nav>
          <button class="new-folder-btn" id="new-folder-btn" aria-label="Create new folder">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            <span>New Folder</span>
          </button>
        </div>

        <!-- Tasks context: projects -->
        <div class="sidebar-context-panel hidden" id="ctx-tasks">
          <div class="sidebar-section-title">Projects</div>
          <nav id="project-list" aria-label="Project navigation"></nav>
        </div>
      </div>

      <!-- Storage usage indicator -->
      <div class="sidebar-footer">
        <div class="storage-info">
          <div class="storage-label">Storage</div>
          <div class="storage-bar-container" role="progressbar" aria-label="Storage usage">
            <div class="storage-bar" id="storage-bar"></div>
          </div>
          <div class="storage-text" id="storage-text">Calculating...</div>
        </div>
      </div>
    </aside>

    <!-- Sidebar backdrop (mobile) -->
    <div class="sidebar-backdrop" id="sidebar-backdrop" aria-hidden="true"></div>

    <!-- ==================== Main Content ==================== -->
    <main class="main-content" id="main-content">

      <!-- ==================== Files View ==================== -->
      <div id="files-view-wrapper">
        <!-- Top Bar -->
        <header class="top-bar">

          <!-- Hamburger (mobile only) -->
          <button class="hamburger-btn" id="hamburger-btn" aria-label="Open menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>

          <!-- Breadcrumb trail -->
          <nav class="breadcrumb" id="breadcrumb" aria-label="Folder path">
            <span class="breadcrumb-item active" data-folder="root">All Files</span>
          </nav>

          <!-- Controls row -->
          <div class="top-bar-controls">

            <!-- Search -->
            <div class="search-container">
              <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              <input
                type="search"
                id="search-input"
                placeholder="Search files..."
                class="search-input"
                aria-label="Search files"
                autocomplete="off"
                spellcheck="false"
              />
            </div>

            <!-- Sort -->
            <select id="sort-select" class="sort-select" aria-label="Sort files by">
              <option value="created_at_desc">Newest first</option>
              <option value="created_at_asc">Oldest first</option>
              <option value="filename_asc">Name A-Z</option>
              <option value="filename_desc">Name Z-A</option>
              <option value="size_desc">Largest first</option>
              <option value="size_asc">Smallest first</option>
            </select>

            <!-- Grid / List toggle -->
            <div class="view-toggle" role="group" aria-label="View mode">
              <button class="view-btn active" id="grid-view-btn" title="Grid view" aria-pressed="true" aria-label="Grid view">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
              </button>
              <button class="view-btn" id="list-view-btn" title="List view" aria-pressed="false" aria-label="List view">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
              </button>
            </div>
          </div>
        </header>

        <!-- Drag-and-drop visual overlay (shown only during drag) -->
        <div class="drop-zone-overlay hidden" id="drop-zone-overlay" aria-hidden="true">
          <div class="drop-zone-content">
            <div class="drop-zone-icon">
              <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            </div>
            <div class="drop-zone-text">Drop files here to upload</div>
          </div>
        </div>

        <!-- File count label -->
        <div class="file-count" id="file-count" aria-live="polite"></div>

        <!-- Files grid / list (content injected by gallery.js) -->
        <div class="files-container grid-view" id="files-container" aria-label="Files" role="list"></div>

        <!-- Empty state -->
        <div class="empty-state hidden" id="empty-state" role="status">
          <div class="empty-icon" aria-hidden="true">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          </div>
          <div class="empty-title">No files here yet</div>
          <div class="empty-subtitle">Upload files or drag & drop to get started</div>
          <label class="btn btn-primary empty-cta" for="file-input">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload Files
          </label>
        </div>

        <!-- Loading state -->
        <div class="loading-state hidden" id="loading-state" role="status" aria-label="Loading files">
          <div class="spinner" aria-hidden="true"></div>
          <div>Loading your files...</div>
        </div>
      </div>

      <!-- ==================== Notes View ==================== -->
      <section class="app-view hidden" id="notes-view" aria-label="Notes">
        <header class="top-bar">
          <button class="hamburger-btn" id="hamburger-btn-notes" aria-label="Open menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h2 class="view-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            Notes
          </h2>
          <div class="top-bar-controls">
            <button class="btn btn-primary" id="new-note-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              New Note
            </button>
          </div>
        </header>
        <div class="view-content" id="notes-container"></div>
        <div class="note-editor hidden" id="note-editor">
          <div class="note-editor-header">
            <button class="btn btn-ghost" id="note-back-btn">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
              Back
            </button>
            <span class="note-editor-hint" id="note-save-status">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              Saved
            </span>
          </div>
          <input type="text" id="note-title-input" placeholder="Note title..." maxlength="100" autocomplete="off" class="note-title-input" />
          <textarea id="note-textarea" placeholder="Start writing..." class="note-textarea"></textarea>
        </div>
      </section>

      <!-- ==================== Tasks View ==================== -->
      <section class="app-view hidden" id="tasks-view" aria-label="Tasks">
        <header class="top-bar">
          <button class="hamburger-btn" id="hamburger-btn-tasks" aria-label="Open menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h2 class="view-title">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
            Tasks
          </h2>
          <div class="top-bar-controls"></div>
        </header>
        <div class="view-content" id="tasks-container"></div>
      </section>

    </main>
  </div>

  <!-- Mobile FAB (floating action button) — opens action menu -->
  <div class="fab-menu" id="fab-menu">
    <button class="fab-menu-item" id="fab-upload-file">
      <span class="fab-menu-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      </span>
      <span class="fab-menu-label">Upload File</span>
    </button>
    <button class="fab-menu-item" id="fab-new-note">
      <span class="fab-menu-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="18" x2="12" y2="12"/><line x1="9" y1="15" x2="15" y2="15"/></svg>
      </span>
      <span class="fab-menu-label">New Note</span>
    </button>
    <button class="fab-menu-item" id="fab-new-task">
      <span class="fab-menu-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </span>
      <span class="fab-menu-label">New Task</span>
    </button>
  </div>
  <button class="fab" id="fab-btn" aria-label="Create new">
    <svg class="fab-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- ============================================================
       Scripts — load order matters!
       ============================================================ -->

  <!-- 1. Supabase CDN (exposes global `supabase`) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- 2. Config (SUPABASE_URL, SUPABASE_ANON_KEY, constants) -->
  <script src="js/config.js"></script>

  <!-- 3. Supabase client instance -->
  <script src="js/supabase-client.js"></script>

  <!-- 4. Data layer -->
  <script src="js/db.js"></script>
  <script src="js/storage.js"></script>

  <!-- 5. UI modules -->
  <script src="js/gallery.js"></script>
  <script src="js/folders.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/upload.js"></script>
  <script src="js/notes.js"></script>
  <script src="js/tasks.js"></script>

  <!-- 6. App coordinator (boots on DOMContentLoaded) -->
  <script src="js/app.js"></script>

</body>
</html>

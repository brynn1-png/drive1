<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyDrive — Personal Cloud Storage</title>
  <meta name="description" content="Your personal cloud drive. Upload, organize, and access your files from anywhere — powered by Supabase." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ============================================================
       Toast Notifications Container
       ============================================================ -->
  <div id="toast-container" aria-live="polite"></div>

  <!-- ============================================================
       Upload Progress Overlay
       ============================================================ -->
  <div id="upload-overlay" class="upload-overlay hidden" role="dialog" aria-modal="true" aria-label="Uploading file">
    <div class="upload-progress-card">
      <div class="upload-icon">⬆️</div>
      <div class="upload-filename" id="upload-filename">Uploading...</div>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
      </div>
      <div class="upload-percent" id="upload-percent">0%</div>
    </div>
  </div>

  <!-- ============================================================
       Lightbox — Full-screen image preview
       ============================================================ -->
  <div id="lightbox" class="lightbox hidden" role="dialog" aria-modal="true" aria-label="Image preview">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close preview">&times;</button>
    <img id="lightbox-img" src="" alt="Preview" />
  </div>

  <!-- ============================================================
       Create Folder Modal
       ============================================================ -->
  <div id="folder-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="folder-modal-title">
    <div class="modal-card">
      <h3 id="folder-modal-title">Create New Folder</h3>
      <input
        type="text"
        id="folder-name-input"
        placeholder="e.g. Work, Vacation, Archive…"
        maxlength="60"
        aria-label="Folder name"
        autocomplete="off"
      />
      <div class="modal-actions">
        <button class="btn btn-ghost" id="folder-modal-cancel">Cancel</button>
        <button class="btn btn-primary" id="folder-modal-confirm">Create Folder</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       Move File Modal
       ============================================================ -->
  <div id="move-modal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="move-modal-title">
    <div class="modal-card">
      <h3 id="move-modal-title">Move to Folder</h3>
      <div id="move-folder-list" role="list"></div>
      <div class="modal-actions">
        <button class="btn btn-ghost" id="move-modal-cancel">Cancel</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       App Layout
       ============================================================ -->
  <div class="app-container">

    <!-- ==================== Sidebar ==================== -->
    <aside class="sidebar" id="sidebar" aria-label="Navigation">

      <!-- Logo -->
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon" aria-hidden="true">☁️</span>
          <span class="logo-text">MyDrive</span>
        </div>
      </div>

      <!-- Upload button (label wraps hidden input) -->
      <label class="upload-btn" for="file-input" id="upload-label" role="button" tabindex="0">
        <span class="upload-btn-icon" aria-hidden="true">+</span>
        <span>Upload Files</span>
      </label>
      <input type="file" id="file-input" multiple hidden aria-label="Select files to upload" />

      <!-- New folder -->
      <button class="new-folder-btn" id="new-folder-btn" aria-label="Create new folder">
        <span aria-hidden="true">📁</span>
        <span>New Folder</span>
      </button>

      <!-- Folder navigation -->
      <div class="sidebar-section">
        <div class="sidebar-section-title" aria-hidden="true">Folders</div>
        <nav id="folder-list" aria-label="Folder navigation"></nav>
      </div>

      <!-- Storage usage indicator -->
      <div class="sidebar-footer">
        <div class="storage-info">
          <div class="storage-label">Storage Used</div>
          <div class="storage-bar-container" role="progressbar" aria-label="Storage usage">
            <div class="storage-bar" id="storage-bar"></div>
          </div>
          <div class="storage-text" id="storage-text">Calculating…</div>
        </div>
      </div>
    </aside>

    <!-- ==================== Main Content ==================== -->
    <main class="main-content" id="main-content">

      <!-- Top Bar -->
      <header class="top-bar">

        <!-- Breadcrumb trail -->
        <nav class="breadcrumb" id="breadcrumb" aria-label="Folder path">
          <span class="breadcrumb-item active" data-folder="root">All Files</span>
        </nav>

        <!-- Controls row -->
        <div class="top-bar-controls">

          <!-- Search -->
          <div class="search-container">
            <span class="search-icon" aria-hidden="true">🔍</span>
            <input
              type="search"
              id="search-input"
              placeholder="Search files…"
              class="search-input"
              aria-label="Search files"
              autocomplete="off"
              spellcheck="false"
            />
          </div>

          <!-- Sort -->
          <select id="sort-select" class="sort-select" aria-label="Sort files by">
            <option value="created_at_desc">Newest first</option>
            <option value="created_at_asc">Oldest first</option>
            <option value="filename_asc">Name A → Z</option>
            <option value="filename_desc">Name Z → A</option>
            <option value="size_desc">Largest first</option>
            <option value="size_asc">Smallest first</option>
          </select>

          <!-- Grid / List toggle -->
          <div class="view-toggle" role="group" aria-label="View mode">
            <button class="view-btn active" id="grid-view-btn" title="Grid view" aria-pressed="true" aria-label="Grid view">⊞</button>
            <button class="view-btn"        id="list-view-btn" title="List view" aria-pressed="false" aria-label="List view">☰</button>
          </div>
        </div>
      </header>

      <!-- Drag-and-drop visual overlay (shown only during drag) -->
      <div class="drop-zone-overlay hidden" id="drop-zone-overlay" aria-hidden="true">
        <div class="drop-zone-content">
          <div class="drop-zone-icon">📂</div>
          <div class="drop-zone-text">Drop files here to upload</div>
        </div>
      </div>

      <!-- File count label -->
      <div class="file-count" id="file-count" aria-live="polite"></div>

      <!-- Files grid / list (content injected by gallery.js) -->
      <div class="files-container grid-view" id="files-container" aria-label="Files" role="list"></div>

      <!-- Empty state -->
      <div class="empty-state hidden" id="empty-state" role="status">
        <div class="empty-icon" aria-hidden="true">📂</div>
        <div class="empty-title">No files here yet</div>
        <div class="empty-subtitle">Click <strong>Upload Files</strong> or drag &amp; drop files to get started</div>
      </div>

      <!-- Loading state -->
      <div class="loading-state hidden" id="loading-state" role="status" aria-label="Loading files">
        <div class="spinner" aria-hidden="true"></div>
        <div>Loading your files…</div>
      </div>

    </main>
  </div>

  <!-- ============================================================
       Scripts — load order matters!
       ============================================================ -->

  <!-- 1. Supabase CDN (exposes global `supabase`) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- 2. Config (SUPABASE_URL, SUPABASE_ANON_KEY, constants) -->
  <script src="js/config.js"></script>

  <!-- 3. Supabase client instance -->
  <script src="js/supabase-client.js"></script>

  <!-- 4. Data layer -->
  <script src="js/db.js"></script>
  <script src="js/storage.js"></script>

  <!-- 5. UI modules -->
  <script src="js/gallery.js"></script>
  <script src="js/folders.js"></script>
  <script src="js/upload.js"></script>

  <!-- 6. App coordinator (boots on DOMContentLoaded) -->
  <script src="js/app.js"></script>

</body>
</html>
